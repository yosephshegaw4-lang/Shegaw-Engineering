backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtitle", name: "hero_subtitle", widget: "text"}
          - {label: "Hero Image", name: "hero_image", widget: "image"}
          
      - file: "about.html"
        label: "About Page"
        name: "about"
        fields:
          - {label: "Page Title", name: "page_title", widget: "string"}
          - {label: "Main Content", name: "content", widget: "markdown"}
          - {label: "Team Image", name: "team_image", widget: "image"}
          
  - name: "services"
    label: "Services"
    folder: "data/services"
    create: true
    fields:
      - {label: "Service Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Icon", name: "icon", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}
      
  - name: "projects"
    label: "Projects"
    folder: "data/projects"
    create: true
    fields:
      - {label: "Project Name", name: "name", widget: "string"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Completion Date", name: "date", widget: "date"}